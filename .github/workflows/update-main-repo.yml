name: Auto-Update Main Repo Submodule

on:
  push:
    branches:
      - master
jobs:
  update-pointer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4
        with:
          repository: "name-is-hai/hiarchy"
          token: ${{ secrets.PAT_TOKEN }}
          submodules: true

      - name: Update Submodule Pointer
        run: |
          git submodule update --remote default/nvim

      - name: Commit and Push to Main Repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add default/nvim

          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update nvim submodule pointer"

          git push origin master
